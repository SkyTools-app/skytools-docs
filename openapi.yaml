      parameters:
        - name: name
          in: query
          schema:
            type: string
          description: Guild name to search for
        - name: player
          in: query
          schema:
            type: string
          description: Minecraft username — returns their guild
      responses:
        "200":
          description: Guild data
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
